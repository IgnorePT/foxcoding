name: Correr tests # Nome do workflow

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on: # quando
  push: #push
    branches: [main] # na branch main

jobs:
  test:
    runs-on: ubuntu-latest # executa no ubuntu
    steps:
      - uses: actions/checkout@v4 # clona o repositório
      - uses: actions/setup-node@v4 # configura o node
        with:
          node-version: "24" # usa a versão 24
      - run: npm install # instala as dependências
      - run: npm test # roda os testes

